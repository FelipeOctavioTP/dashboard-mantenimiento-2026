<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserva de Salas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg: #0B1220;
    --panel: #131C30;
    --panel-2: #0F1729;
    --border: #22304A;
    --text: #E7ECF5;
    --text-muted: #8695AD;
    --free: #22C55E;
    --free-dim: #14532D;
    --busy: #EF4444;
    --busy-dim: #4C1D1D;
    --select: #38BDF8;
    --select-dim: #0C4A6E;
    --amber: #F59E0B;
    --radius: 10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: radial-gradient(1200px 600px at 50% -10%, #172038 0%, var(--bg) 60%);
    color: var(--text);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    padding: 20px 14px 60px;
  }
  .app{ max-width: 640px; margin: 0 auto; }

  /* --- Header: door-panel signature element --- */
  .door-panel{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 22px 20px;
    position: relative;
    overflow: hidden;
  }
  .door-panel::before{
    content:"";
    position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(56,189,248,0.06), transparent 40%);
    pointer-events:none;
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .room-name{
    font-family:'Space Grotesk', sans-serif;
    font-size: 26px;
    font-weight: 700;
    margin: 4px 0 16px;
  }
  .room-tabs{
    display:flex; gap:8px; margin-bottom:16px;
  }
  .room-tab{
    flex:1; padding: 9px 10px; border-radius: 8px; border:1px solid var(--border);
    background: var(--panel-2); color: var(--text-muted); font-size:13px;
    font-family:'Inter',sans-serif; font-weight:600; cursor:pointer; text-align:center;
  }
  .room-tab.active{
    border-color: var(--select); color:#fff; background: var(--select-dim);
  }
  .status-row{
    display:flex; align-items:center; gap:12px;
    padding: 14px 16px;
    border-radius: var(--radius);
    background: var(--panel-2);
    border: 1px solid var(--border);
  }
  .dot{
    width: 14px; height:14px; border-radius:50%;
    background: var(--text-muted);
    box-shadow: 0 0 0 4px rgba(255,255,255,0.03);
    flex-shrink:0;
    transition: background .2s;
  }
  .dot.free{ background: var(--free); box-shadow: 0 0 14px 2px rgba(34,197,94,0.55);}
  .dot.busy{ background: var(--busy); box-shadow: 0 0 14px 2px rgba(239,68,68,0.55);}
  .status-text{ font-weight:600; font-size:15px; }
  .status-sub{ font-size:12.5px; color:var(--text-muted); margin-top:2px; }

  /* --- Date nav --- */
  .date-nav{
    display:flex; align-items:center; gap:8px;
    margin: 16px 0 10px;
  }
  .date-nav button{
    width:38px; height:38px; border-radius:8px;
    background: var(--panel); border:1px solid var(--border);
    color: var(--text); font-size:16px; cursor:pointer;
  }
  .date-nav button:hover{ border-color: var(--select); }
  .date-nav input[type=date]{
    flex:1; background: var(--panel); border:1px solid var(--border);
    color: var(--text); padding: 9px 10px; border-radius:8px;
    font-family:'JetBrains Mono', monospace; font-size:14px;
  }
  .conn{
    font-size:11px; font-family:'JetBrains Mono',monospace; color: var(--text-muted);
    display:flex; align-items:center; gap:5px; padding: 0 6px; white-space:nowrap;
  }
  .conn .pip{ width:7px; height:7px; border-radius:50%; background:var(--text-muted); }
  .conn.ok .pip{ background: var(--free); }
  .conn.local .pip{ background: var(--amber); }

  /* --- Grid panel --- */
  .section-title{
    font-family:'Space Grotesk', sans-serif;
    font-size: 14px; font-weight:600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing:0.06em;
    margin: 22px 2px 10px;
  }
  .legend{
    display:flex; gap:16px; font-size:12px; color:var(--text-muted); margin: 0 2px 10px;
  }
  .legend span{ display:flex; align-items:center; gap:6px; }
  .legend i{ width:10px; height:10px; border-radius:3px; display:inline-block; }
  .legend .i-free{ background: var(--free-dim); border:1px solid var(--free); }
  .legend .i-busy{ background: var(--busy-dim); border:1px solid var(--busy); }
  .legend .i-sel{ background: var(--select-dim); border:1px solid var(--select); }

  .time-grid{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px;
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    max-height: 340px;
    overflow-y:auto;
  }
  .slot{
    font-family:'JetBrains Mono', monospace;
    font-size: 13px;
    text-align:center;
    padding: 10px 4px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text-muted);
    cursor:pointer;
    user-select:none;
    transition: transform .1s;
  }
  .slot:hover:not(.busy):not(.past){ transform: translateY(-1px); border-color: var(--select); }
  .slot.free{ color: var(--free); border-color: rgba(34,197,94,0.35); }
  .slot.busy{ color: var(--busy); background: var(--busy-dim); border-color: var(--busy); cursor:not-allowed; opacity:0.85; }
  .slot.selected{ color:#fff; background: var(--select-dim); border-color: var(--select); font-weight:600; }
  .slot.past{ opacity:0.35; cursor:not-allowed; }

  /* --- Booking form --- */
  .booking-form{
    margin-top: 16px;
    background: var(--panel);
    border: 1px solid var(--select);
    border-radius: var(--radius);
    padding: 16px;
  }
  .booking-form .range{
    font-family:'JetBrains Mono', monospace;
    color: var(--select);
    font-size: 14px;
    margin-bottom: 12px;
  }
  .field{ margin-bottom: 12px; }
  .field label{ display:block; font-size:12px; color:var(--text-muted); margin-bottom:5px; }
  .field input, .field textarea{
    width:100%; background: var(--panel-2); border:1px solid var(--border);
    color: var(--text); padding: 10px; border-radius:8px; font-family:'Inter',sans-serif; font-size:14px;
    resize: vertical;
  }
  .form-actions{ display:flex; gap:10px; margin-top:14px; }
  .btn{
    flex:1; padding: 11px; border-radius: 8px; border:none; cursor:pointer;
    font-weight:600; font-size:14px; font-family:'Inter',sans-serif;
  }
  .btn-primary{ background: var(--select); color:#04141F; }
  .btn-primary:hover{ filter:brightness(1.08); }
  .btn-ghost{ background: transparent; border:1px solid var(--border); color: var(--text-muted); }
  .btn-ghost:hover{ border-color: var(--text-muted); color: var(--text); }
  .error-msg{ color: var(--busy); font-size:13px; margin-top:8px; }

  /* --- Reservations list --- */
  .res-item{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display:flex; justify-content:space-between; align-items:flex-start;
    margin-bottom: 8px;
    gap: 10px;
  }
  .res-item .hora{
    font-family:'JetBrains Mono', monospace; color: var(--select); font-weight:600; font-size:13px;
  }
  .res-item .motivo{ font-size:14px; margin-top:3px; }
  .res-item .responsable{ font-size:12px; color: var(--text-muted); margin-top:2px; }
  .res-item .del{
    background: none; border:1px solid var(--border); color: var(--text-muted);
    border-radius:6px; width:30px; height:30px; cursor:pointer; flex-shrink:0;
  }
  .res-item .del:hover{ border-color: var(--busy); color: var(--busy); }
  .empty-msg{ color: var(--text-muted); font-size:13px; padding: 10px 2px; }

  .res-item-wrap{ margin-bottom: 8px; }
  .cancel-inline{
    background: var(--panel-2);
    border: 1px solid var(--busy);
    border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    padding: 12px 14px;
    margin-top: -8px;
  }
  .cancel-inline .field{ margin-bottom: 8px; }
  .cancel-inline label{ display:block; font-size:11.5px; color:var(--text-muted); margin-bottom:4px; }
  .cancel-inline input{
    width:100%; background: var(--panel); border:1px solid var(--border);
    color: var(--text); padding: 8px 10px; border-radius:7px; font-size:13.5px; font-family:'Inter',sans-serif;
  }
  .cancel-inline .actions{ display:flex; gap:8px; margin-top:10px; }
  .cancel-inline .btn{ padding: 8px; font-size:13px; }
  .cancel-inline .err{ color: var(--busy); font-size:12px; margin-top:6px; }

  /* --- QR panel --- */
  .qr-toggle{
    width:100%; margin-top:22px; padding:12px; border-radius: var(--radius);
    background: var(--panel); border:1px dashed var(--border); color: var(--text-muted);
    cursor:pointer; font-size:13px; font-family:'JetBrains Mono',monospace;
  }
  .qr-toggle:hover{ border-color: var(--select); color: var(--text); }
  .qr-box{
    margin-top:12px; background:#fff; border-radius: var(--radius);
    padding: 20px; text-align:center;
  }
  .qr-box #qrcode{ display:flex; justify-content:center; }
  .qr-box p{ color:#0B1220; font-family:'Space Grotesk',sans-serif; font-weight:600; margin: 12px 0 4px; }
  .qr-box small{ color:#556; }
  .qr-print-btn{
    margin-top:10px; padding:8px 16px; border-radius:6px; border:1px solid #0B1220;
    background:#0B1220; color:#fff; cursor:pointer; font-size:12px;
  }

  @media print{
    body *{ visibility:hidden; }
    .qr-box, .qr-box *{ visibility:visible; }
    .qr-box{ position:fixed; top:0; left:0; width:100%; }
  }

  ::-webkit-scrollbar{ width:6px; }
  ::-webkit-scrollbar-thumb{ background: var(--border); border-radius:3px; }
</style>
</head>
<body>
<div class="app">

  <div class="door-panel">
    <span class="eyebrow">RESERVA DE SALA</span>
    <div class="room-name" id="roomName">Sala de Reuniones</div>
    <div class="room-tabs" id="roomTabs"></div>
    <div class="status-row">
      <span class="dot" id="statusDot"></span>
      <div>
        <div class="status-text" id="statusText">Cargando estado…</div>
        <div class="status-sub" id="statusSub"></div>
      </div>
    </div>
  </div>

  <div class="date-nav">
    <button id="prevDay" title="Día anterior">‹</button>
    <input type="date" id="datePicker">
    <button id="nextDay" title="Día siguiente">›</button>
    <span class="conn" id="connIndicator"><span class="pip"></span><span id="connText">—</span></span>
  </div>

  <div class="section-title">Horarios</div>
  <div class="legend">
    <span><i class="i-free"></i>Libre</span>
    <span><i class="i-busy"></i>Ocupado</span>
    <span><i class="i-sel"></i>Seleccionado</span>
  </div>
  <div class="time-grid" id="timeGrid"></div>

  <div class="booking-form" id="bookingForm" hidden>
    <div class="range" id="rangeLabel"></div>
    <div class="field">
      <label for="respInput">Reservado por</label>
      <input type="text" id="respInput" placeholder="Tu nombre">
    </div>
    <div class="field">
      <label for="emailInput">Correo (para poder cancelar la reserva después)</label>
      <input type="email" id="emailInput" placeholder="tu.correo@empresa.com">
    </div>
    <div class="field">
      <label for="motivoInput">Motivo</label>
      <textarea id="motivoInput" rows="2" placeholder="Ej: Reunión semanal de mantenimiento"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" id="cancelSel">Cancelar</button>
      <button class="btn btn-primary" id="confirmRes">Confirmar reserva</button>
    </div>
    <div class="error-msg" id="formError" hidden></div>
  </div>

  <div class="section-title" style="margin-top:26px;">Reservas del día</div>
  <div id="reservationsList"></div>

  <button class="qr-toggle" id="toggleQr">▢ Mostrar código QR para imprimir en la puerta</button>
  <div class="qr-box" id="qrBox" hidden>
    <div id="qrcode"></div>
    <p id="qrRoomLabel">Sala de Reuniones</p>
    <small>Escanea para ver disponibilidad y reservar</small><br>
    <button class="qr-print-btn" id="printQr">Imprimir</button>
  </div>

</div>

<script>
/* ============================================================
   CONFIGURACIÓN — completa estos 3 valores antes de publicar
   ============================================================ */
const CONFIG = {
  SUPABASE_URL: "https://xnlqyxxyryqyziksmajn.supabase.co",
  SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhubHF5eHh5cnlxeXppa3NtYWpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NzQxODEsImV4cCI6MjA5NzQ1MDE4MX0.uKhq16RBJSoEKLdjD04DTrHnBOg9IxU2cpREQfSf8S4",
  ROOMS: ["Sala de Reuniones", "Sala Capacitaciones"],
  HORA_INICIO: 8,   // hora de apertura (24h)
  HORA_FIN: 20,     // hora de cierre (24h)
  PASO_MINUTOS: 30  // duración de cada bloque
};
/* ============================================================
   SQL para crear la tabla en Supabase (ejecutar una sola vez):

   create table reservas_sala (
     id bigint generated always as identity primary key,
     sala text not null default 'Sala de Reuniones',
     fecha date not null,
     hora_inicio time not null,
     hora_fin time not null,
     motivo text not null,
     responsable text not null,
     correo text not null,
     created_at timestamptz default now()
   );
   alter table reservas_sala enable row level security;
   create policy "lectura publica" on reservas_sala for select using (true);
   create policy "insercion publica" on reservas_sala for insert with check (true);
   create policy "borrado publico" on reservas_sala for delete using (true);

   -- Nota: el correo queda guardado en la tabla y por lo tanto es legible
   -- por cualquiera con la anon key (igual que el resto de las columnas).
   -- La app evita mostrarlo y evita traerlo en la consulta de la grilla,
   -- pero esto es una barrera de UI, no una restricción real a nivel de
   -- base de datos. Si en algún momento quieres que sea inaccesible de
   -- verdad, la validación de cancelación debería moverse a una función
   -- RPC (SECURITY DEFINER) en vez de comparar en el navegador.
   ============================================================ */

let selectedRoom = CONFIG.ROOMS[0];

function renderRoomTabs(){
  const tabs = document.getElementById('roomTabs');
  tabs.innerHTML = '';
  CONFIG.ROOMS.forEach(room=>{
    const btn = document.createElement('div');
    btn.className = 'room-tab' + (room === selectedRoom ? ' active' : '');
    btn.textContent = room;
    btn.addEventListener('click', async ()=>{
      if (selectedRoom === room) return;
      selectedRoom = room;
      document.getElementById('roomName').textContent = selectedRoom;
      document.getElementById('qrRoomLabel').textContent = 'Escanea para reservar cualquiera de las salas';
      selStart = null; selEnd = null;
      document.getElementById('bookingForm').hidden = true;
      renderRoomTabs();
      await refresh();
    });
    tabs.appendChild(btn);
  });
}
document.getElementById('roomName').textContent = selectedRoom;
renderRoomTabs();
document.getElementById('qrRoomLabel').textContent = 'Escanea para reservar cualquiera de las salas';

const usingSupabase = CONFIG.SUPABASE_URL !== "TU_SUPABASE_URL" && CONFIG.SUPABASE_ANON_KEY !== "TU_SUPABASE_ANON_KEY";
let supabaseClient = null;
if (usingSupabase) {
  supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
}

// Fallback local (solo memoria de esta pestaña) si no hay Supabase configurado
let localStore = [];

const connIndicator = document.getElementById('connIndicator');
const connText = document.getElementById('connText');
if (usingSupabase) {
  connIndicator.classList.add('ok');
  connText.textContent = 'Conectado';
} else {
  connIndicator.classList.add('local');
  connText.textContent = 'Modo local (sin guardar)';
}

function pad(n){ return n.toString().padStart(2,'0'); }
function todayISO(){
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function timeToMin(t){ const [h,m] = t.split(':').map(Number); return h*60+m; }
function minToTime(m){ return `${pad(Math.floor(m/60))}:${pad(m%60)}`; }

const datePicker = document.getElementById('datePicker');
datePicker.value = todayISO();

let selectedDate = datePicker.value;
let reservations = []; // reservas del día seleccionado
let selStart = null, selEnd = null;

async function fetchReservations(dateStr){
  if (usingSupabase){
    // Nota: no se trae la columna "correo" aquí para no exponerla en la
    // grilla/lista pública. Solo se consulta puntualmente al cancelar.
    const { data, error } = await supabaseClient
      .from('reservas_sala')
      .select('id, sala, fecha, hora_inicio, hora_fin, motivo, responsable')
      .eq('fecha', dateStr)
      .eq('sala', selectedRoom)
      .order('hora_inicio', { ascending: true });
    if (error){ console.error(error); return []; }
    return data;
  } else {
    return localStore.filter(r => r.fecha === dateStr && r.sala === selectedRoom);
  }
}

function isValidEmail(str){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(str);
}

function overlaps(aStart,aEnd,bStart,bEnd){
  return aStart < bEnd && bStart < aEnd;
}

function buildSlots(){
  const slots = [];
  const startMin = CONFIG.HORA_INICIO*60;
  const endMin = CONFIG.HORA_FIN*60;
  for(let m=startMin; m<endMin; m+=CONFIG.PASO_MINUTOS){
    slots.push(m);
  }
  return slots;
}

function renderGrid(){
  const grid = document.getElementById('timeGrid');
  grid.innerHTML = '';
  const slots = buildSlots();
  const isToday = selectedDate === todayISO();
  const nowMin = new Date().getHours()*60 + new Date().getMinutes();

  slots.forEach(startMin=>{
    const endMin = startMin + CONFIG.PASO_MINUTOS;
    const div = document.createElement('div');
    div.className = 'slot';
    div.textContent = minToTime(startMin);

    const isPast = isToday && endMin <= nowMin;
    const busyRes = reservations.find(r => overlaps(startMin,endMin, timeToMin(r.hora_inicio.slice(0,5)), timeToMin(r.hora_fin.slice(0,5))));

    if (isPast){
      div.classList.add('past');
    } else if (busyRes){
      div.classList.add('busy');
      div.title = `${busyRes.responsable}: ${busyRes.motivo}`;
    } else {
      div.classList.add('free');
      div.addEventListener('click', ()=> onSlotClick(startMin));
    }

    if (selStart !== null && selEnd !== null && startMin >= selStart && startMin < selEnd){
      div.classList.remove('free');
      div.classList.add('selected');
    }

    grid.appendChild(div);
  });
}

function onSlotClick(startMin){
  const endMin = startMin + CONFIG.PASO_MINUTOS;
  if (selStart === null){
    selStart = startMin;
    selEnd = endMin;
  } else if (startMin === selStart && selEnd === endMin) {
    // deselect
    selStart = null; selEnd = null;
    document.getElementById('bookingForm').hidden = true;
    renderGrid();
    return;
  } else {
    // extend range if contiguous and free
    if (startMin >= selEnd){
      // check all slots between selEnd and endMin are free
      const slots = buildSlots();
      const inBetween = slots.filter(s => s >= selStart && s < endMin);
      const anyBusy = inBetween.some(s => reservations.some(r => overlaps(s, s+CONFIG.PASO_MINUTOS, timeToMin(r.hora_inicio.slice(0,5)), timeToMin(r.hora_fin.slice(0,5)))));
      if (anyBusy){
        selStart = startMin; selEnd = endMin;
      } else {
        selEnd = endMin;
      }
    } else if (startMin < selStart){
      selStart = startMin;
    } else {
      selEnd = endMin;
    }
  }
  showBookingForm();
  renderGrid();
}

function showBookingForm(){
  const form = document.getElementById('bookingForm');
  form.hidden = false;
  document.getElementById('rangeLabel').textContent =
    `${selectedDate}  ·  ${minToTime(selStart)} – ${minToTime(selEnd)}`;
  document.getElementById('formError').hidden = true;
}

document.getElementById('cancelSel').addEventListener('click', ()=>{
  selStart = null; selEnd = null;
  document.getElementById('bookingForm').hidden = true;
  document.getElementById('respInput').value = '';
  document.getElementById('motivoInput').value = '';
  renderGrid();
});

document.getElementById('confirmRes').addEventListener('click', async ()=>{
  const responsable = document.getElementById('respInput').value.trim();
  const correo = document.getElementById('emailInput').value.trim();
  const motivo = document.getElementById('motivoInput').value.trim();
  const errEl = document.getElementById('formError');

  if (!responsable || !correo || !motivo){
    errEl.textContent = 'Completa tu nombre, correo y el motivo.';
    errEl.hidden = false;
    return;
  }
  if (!isValidEmail(correo)){
    errEl.textContent = 'Ingresa un correo válido.';
    errEl.hidden = false;
    return;
  }

  // re-chequear conflictos justo antes de guardar
  const fresh = await fetchReservations(selectedDate);
  const conflict = fresh.some(r => overlaps(selStart, selEnd, timeToMin(r.hora_inicio.slice(0,5)), timeToMin(r.hora_fin.slice(0,5))));
  if (conflict){
    errEl.textContent = 'Uno de los bloques seleccionados ya fue reservado. Actualiza e intenta de nuevo.';
    errEl.hidden = false;
    reservations = fresh;
    renderGrid();
    return;
  }

  const nuevaReserva = {
    sala: selectedRoom,
    fecha: selectedDate,
    hora_inicio: minToTime(selStart) + ':00',
    hora_fin: minToTime(selEnd) + ':00',
    motivo, responsable, correo
  };

  if (usingSupabase){
    const { error } = await supabaseClient.from('reservas_sala').insert(nuevaReserva);
    if (error){
      errEl.textContent = 'Error al guardar: ' + error.message;
      errEl.hidden = false;
      return;
    }
  } else {
    nuevaReserva.id = Date.now();
    localStore.push(nuevaReserva);
  }

  selStart = null; selEnd = null;
  document.getElementById('bookingForm').hidden = true;
  document.getElementById('respInput').value = '';
  document.getElementById('emailInput').value = '';
  document.getElementById('motivoInput').value = '';
  await refresh();
});

let openCancelId = null;

function toggleCancelInline(id){
  openCancelId = (openCancelId === id) ? null : id;
  renderList();
}

async function verifyAndDelete(id, enteredEmail, errEl){
  enteredEmail = enteredEmail.trim().toLowerCase();
  if (!enteredEmail){
    errEl.textContent = 'Ingresa el correo con el que reservaste.';
    errEl.hidden = false;
    return;
  }

  if (usingSupabase){
    const { data, error } = await supabaseClient
      .from('reservas_sala')
      .select('correo')
      .eq('id', id)
      .single();
    if (error){
      errEl.textContent = 'No se pudo verificar: ' + error.message;
      errEl.hidden = false;
      return;
    }
    if (!data || data.correo.trim().toLowerCase() !== enteredEmail){
      errEl.textContent = 'Ese correo no coincide con el de la reserva.';
      errEl.hidden = false;
      return;
    }
    const { error: delError } = await supabaseClient.from('reservas_sala').delete().eq('id', id);
    if (delError){
      errEl.textContent = 'Error al cancelar: ' + delError.message;
      errEl.hidden = false;
      return;
    }
  } else {
    const res = localStore.find(r => r.id === id);
    if (!res || res.correo.trim().toLowerCase() !== enteredEmail){
      errEl.textContent = 'Ese correo no coincide con el de la reserva.';
      errEl.hidden = false;
      return;
    }
    localStore = localStore.filter(r => r.id !== id);
  }

  openCancelId = null;
  await refresh();
}

function renderList(){
  const list = document.getElementById('reservationsList');
  list.innerHTML = '';
  if (reservations.length === 0){
    list.innerHTML = '<div class="empty-msg">No hay reservas para este día.</div>';
    return;
  }
  reservations.forEach(r=>{
    const wrap = document.createElement('div');
    wrap.className = 'res-item-wrap';

    const item = document.createElement('div');
    item.className = 'res-item';
    item.innerHTML = `
      <div>
        <div class="hora">${r.hora_inicio.slice(0,5)} – ${r.hora_fin.slice(0,5)}</div>
        <div class="motivo">${escapeHtml(r.motivo)}</div>
        <div class="responsable">${escapeHtml(r.responsable)}</div>
      </div>
      <button class="del" title="Cancelar reserva">✕</button>
    `;
    item.querySelector('.del').addEventListener('click', ()=> toggleCancelInline(r.id));
    wrap.appendChild(item);

    if (openCancelId === r.id){
      const panel = document.createElement('div');
      panel.className = 'cancel-inline';
      panel.innerHTML = `
        <div class="field">
          <label>Confirma el correo con el que reservaste</label>
          <input type="email" placeholder="tu.correo@empresa.com" class="cancel-email">
        </div>
        <div class="actions">
          <button class="btn btn-ghost cancel-back">Volver</button>
          <button class="btn btn-primary cancel-confirm">Cancelar reserva</button>
        </div>
        <div class="err" hidden></div>
      `;
      const errEl = panel.querySelector('.err');
      const emailField = panel.querySelector('.cancel-email');
      panel.querySelector('.cancel-back').addEventListener('click', ()=>{ openCancelId = null; renderList(); });
      panel.querySelector('.cancel-confirm').addEventListener('click', ()=> verifyAndDelete(r.id, emailField.value, errEl));
      wrap.appendChild(panel);
    }

    list.appendChild(wrap);
  });
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function renderStatus(){
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const sub = document.getElementById('statusSub');

  if (selectedDate !== todayISO()){
    dot.className = 'dot';
    text.textContent = `Viendo ${selectedDate}`;
    sub.textContent = '';
    return;
  }

  const nowMin = new Date().getHours()*60 + new Date().getMinutes();
  const current = reservations.find(r => timeToMin(r.hora_inicio.slice(0,5)) <= nowMin && nowMin < timeToMin(r.hora_fin.slice(0,5)));

  if (current){
    dot.className = 'dot busy';
    text.textContent = `Ocupada hasta las ${current.hora_fin.slice(0,5)}`;
    sub.textContent = `${current.motivo} — ${current.responsable}`;
  } else {
    dot.className = 'dot free';
    const next = reservations
      .map(r => timeToMin(r.hora_inicio.slice(0,5)))
      .filter(m => m > nowMin)
      .sort((a,b)=>a-b)[0];
    text.textContent = 'Libre ahora';
    sub.textContent = next !== undefined ? `Próxima reserva a las ${minToTime(next)}` : 'Sin reservas pendientes hoy';
  }
}

async function refresh(){
  reservations = await fetchReservations(selectedDate);
  renderGrid();
  renderList();
  renderStatus();
}

document.getElementById('datePicker').addEventListener('change', async (e)=>{
  selectedDate = e.target.value;
  selStart = null; selEnd = null;
  document.getElementById('bookingForm').hidden = true;
  await refresh();
});

document.getElementById('prevDay').addEventListener('click', async ()=>{
  const d = new Date(selectedDate + 'T00:00:00');
  d.setDate(d.getDate()-1);
  selectedDate = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  datePicker.value = selectedDate;
  selStart = null; selEnd = null;
  document.getElementById('bookingForm').hidden = true;
  await refresh();
});

document.getElementById('nextDay').addEventListener('click', async ()=>{
  const d = new Date(selectedDate + 'T00:00:00');
  d.setDate(d.getDate()+1);
  selectedDate = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  datePicker.value = selectedDate;
  selStart = null; selEnd = null;
  document.getElementById('bookingForm').hidden = true;
  await refresh();
});

// QR
let qrRendered = false;
document.getElementById('toggleQr').addEventListener('click', ()=>{
  const box = document.getElementById('qrBox');
  box.hidden = !box.hidden;
  if (!box.hidden && !qrRendered){
    new QRCode(document.getElementById('qrcode'), {
      text: window.location.href.split('#')[0].split('?')[0],
      width: 200, height: 200,
      colorDark: '#0B1220', colorLight: '#ffffff'
    });
    qrRendered = true;
  }
});
document.getElementById('printQr').addEventListener('click', ()=> window.print());

// refrescar el estado (libre/ocupada) cada minuto
setInterval(renderStatus, 60000);

refresh();
</script>
